name: Test Lint Publish

on:
  workflow_dispatch:

jobs:
  linting_docs_build:
    if: github.ref == 'refs/heads/master'
    name: Lint and Docs Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Lint
        run: |
          cargo fmt -- --check
          cargo clippy --all-features -- -D warnings

      - name: Running Doc Compile
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  multi_platform_build:
    needs: linting_docs_build
    if: github.ref == 'refs/heads/master'
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build all features
        run: cargo build --all-features

  creates_publish:
    needs: multi_platform_build
    if: github.ref == 'refs/heads/master'
    name: Crates Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Publishing to Crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "OC_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create a GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.OC_VERSION }}
          name: ${{ env.OC_VERSION }}
          omitBody: true
          token: ${{ secrets.RELEASE_TOKEN }}